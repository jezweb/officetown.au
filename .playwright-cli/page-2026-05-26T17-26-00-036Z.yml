  - generic [ref=e21]:
    - heading "The shape" [level=2] [ref=e22]
    - paragraph [ref=e23]: Four buildings. Four core roles. Add role packs as the work demands.
    - generic [ref=e24]: "your-town/ ├── buildings/ │ ├── office/ # boss — routes work, holds the thread │ ├── library/ # librarian — extracts + curates the wiki │ ├── workshop/ # worker — deep work │ └── lookout/ # scout — outward scanning ├── wiki/ # the shared substrate │ ├── business/ # who you are │ ├── owner/ # voice + rhythm │ ├── team/ # humans + agents │ ├── contacts/ # external people │ ├── orgs/ # clients, prospects, vendors │ ├── projects/ # active + historical work │ ├── decisions/ # why we chose X │ ├── knowledge/ # graduated findings │ └── tasks/ # what's open, in flight, done └── AGENTS.md # the town's standing orders"
  - generic [ref=e26]:
    - heading "The roles" [level=2] [ref=e27]
    - paragraph [ref=e28]: Address them by name. Each knows what they do and what they don't.
    - generic [ref=e29]:
      - generic [ref=e30]:
        - heading "💬 @boss" [level=3] [ref=e31]
        - paragraph [ref=e32]: Talks to you. Routes work. Holds the thread across sessions. Never does deep work itself.
      - generic [ref=e33]:
        - heading "📚 @librarian" [level=3] [ref=e34]
        - paragraph [ref=e35]: Extracts knowledge from your sources. Curates the wiki. Graduates findings into durable concepts.
      - generic [ref=e36]:
        - heading "⚙️ @worker" [level=3] [ref=e37]
        - paragraph [ref=e38]: Deep work. Building. Research. Ships artefacts. Names trade-offs honestly.
      - generic [ref=e39]:
        - heading "🔭 @scout" [level=3] [ref=e40]
        - paragraph [ref=e41]: Outward-facing. Industry. Tools. World. Surfaces what the inward roles wouldn't notice.
